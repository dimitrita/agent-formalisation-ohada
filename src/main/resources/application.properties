spring.application.name=formalisation-ohada

# --- Anthropic / Claude (Spring AI) ---
# La cle est lue depuis la variable d'environnement ANTHROPIC_API_KEY.
# JAMAIS ecrire la cle en dur ici (le fichier peut finir sur git).
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Modele utilise. Haiku = le moins cher, parfait pour un smoke test.
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.temperature=0.3
spring.ai.anthropic.chat.options.max-tokens=300

# --- Embeddings LOCAUX (Spring AI Transformers / ONNX) ---
# transformers = moteur d'embedding local ONNX, aucune cle API, aucun appel reseau.
spring.ai.model.embedding=transformers
# Tranche 5 : on remplace le defaut all-MiniLM (384d, anglophone) par bge-m3 (1024d, multilingue FR).
# Fichiers telecharges dans models/embedding/ (non versionnes, cf models/embedding/SOURCES.md).
# model.onnx pointe vers le graphe ; model.onnx_data (poids, 2,3 Go) est charge automatiquement
# par ONNX Runtime car il est COTE-A-COTE dans le meme dossier.
spring.ai.embedding.transformer.onnx.model-uri=file:models/embedding/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=file:models/embedding/tokenizer.json
# NB pooling : on garde le defaut Spring AI (mean sur last_hidden_state). bge-m3 est entraine en CLS,
# donc c'est sous-optimal mais fonctionnel. A raffiner via la variante sentence_transformers.onnx
# SEULEMENT si le golden set le justifie (cf apprentissage §1 pooling CLS vs mean).

# --- Connexion PostgreSQL (conteneur docker-compose) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ohada_rag
spring.datasource.username=ohada
spring.datasource.password=ohada

# --- Vector store pgvector ---
# initialize-schema=true : Spring AI cree l'extension vector + la table + l'index au demarrage.
spring.ai.vectorstore.pgvector.initialize-schema=true
# dimensions DOIT valoir 1024 = taille des vecteurs bge-m3 (etait 384 pour all-MiniLM).
# Mismatch = insert rejete par pgvector. Changer ce nombre impose DROP TABLE + re-embed tout le corpus.
spring.ai.vectorstore.pgvector.dimensions=1024
# COSINE = mesure de similarite standard pour du texte.
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# HNSW = index rapide pour la recherche approximative de plus proches voisins.
spring.ai.vectorstore.pgvector.index-type=HNSW
# Nom de la table = notre 1ere collection RAG (cf spec section 2 : ohada_core).
spring.ai.vectorstore.pgvector.table-name=ohada_core

# --- Reranking LOCAL (cross-encoder ONNX via LangChain4j) ---
# Fichiers a telecharger sur disque (voir models/reranker/SOURCES.md), non versionnes.
# rerank.top-n = combien de candidats on remonte de pgvector AVANT de reranker.
# rerank.top-k = combien on garde APRES rerank (ce qu'on renvoie).
rerank.model-path=models/reranker/model.onnx
rerank.tokenizer-path=models/reranker/tokenizer.json
rerank.top-n=20
rerank.top-k=3

# --- Guardrail (Tranche 7 : anti-hallucination) ---
# Seuil d'ABSTENTION sur le score du reranker BGE. Les rerankers BGE sont calibres :
#   score > 0  ~ le chunk repond a la question (pertinent)
#   score < 0  ~ le chunk NE repond PAS (non pertinent)
# Si le MEILLEUR chunk retourne a un score < ce seuil => on s'abstient ("je ne sais pas"),
# AUCUN appel a Claude (anti-hallucination + economie de tokens). Cas type : "capital minimum SARL"
# (la reponse n'existe pas dans le corpus revise 2014 -> scores negatifs -> abstention legitime).
# 0.0 = frontiere naturelle du calibrage BGE. Remonter le seuil = plus prudent (plus d'abstentions).
guardrail.rerank-min-score=0.0
