spring.application.name=formalisation-ohada

# --- Anthropic / Claude (Spring AI) ---
# La cle est lue depuis la variable d'environnement ANTHROPIC_API_KEY.
# JAMAIS ecrire la cle en dur ici (le fichier peut finir sur git).
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

# Modele utilise. Haiku = le moins cher, parfait pour un smoke test.
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.temperature=0.3
spring.ai.anthropic.chat.options.max-tokens=300

# --- Embeddings LOCAUX (Spring AI Transformers / ONNX) ---
# transformers = modele embarque all-MiniLM-L6-v2 (384 dimensions), aucune cle API.
# Explicite meme si c'est le defaut : lisibilite du choix.
spring.ai.model.embedding=transformers

# --- Connexion PostgreSQL (conteneur docker-compose) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ohada_rag
spring.datasource.username=ohada
spring.datasource.password=ohada

# --- Vector store pgvector ---
# initialize-schema=true : Spring AI cree l'extension vector + la table + l'index au demarrage.
spring.ai.vectorstore.pgvector.initialize-schema=true
# dimensions DOIT valoir 384 = taille des vecteurs all-MiniLM. Mismatch = insert rejete.
spring.ai.vectorstore.pgvector.dimensions=384
# COSINE = mesure de similarite standard pour du texte.
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
# HNSW = index rapide pour la recherche approximative de plus proches voisins.
spring.ai.vectorstore.pgvector.index-type=HNSW
# Nom de la table = notre 1ere collection RAG (cf spec section 2 : ohada_core).
spring.ai.vectorstore.pgvector.table-name=ohada_core
